apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-controller-role
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-controller-rolebinding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: default
    namespace: default
roleRef:
  kind: Role
  name: sandbox-controller-role
  apiGroup: rbac.authorization.k8s.io
