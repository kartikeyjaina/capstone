apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-deployment
  labels:
    name: ai-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ai-server

  template:
    metadata:
      labels:
        app: ai-server

    spec:
      containers:
        - name: ai-server
          image: ai-orchestration
          imagePullPolicy: IfNotPresent

          envFrom:
            - secretRef:
                name: ai-secret

          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "256Mi"

          ports:
            - containerPort: 3000
              name: ai-server-port

          livenessProbe:
            httpGet:
              path: /api/status/healthz
              port: 3000
            initialDelaySeconds: 90
            timeoutSeconds: 10

          readinessProbe:
            httpGet:
              path: /api/status/healthz
              port: 3000
            initialDelaySeconds: 30
            timeoutSeconds: 10